<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Lynthz</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;650;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f1ece3; --bg-deep: #e7ded2;
    --line: rgba(52, 43, 33, 0.10); --line-strong: rgba(52, 43, 33, 0.17);
    --text: #1d1915; --t2: #6e6256; --t3: #9c9186;
    --dark: #24211e; --gold: #b68b58; --white: #fffaf2;
    --shadow: 0 18px 50px rgba(45,36,28,0.13), 0 5px 16px rgba(45,36,28,.07);
    --shadow-soft: 0 10px 30px rgba(45,36,28,0.10);
    --font-display: 'Inter', sans-serif; --font-body: 'DM Sans', sans-serif;
  }

  html, body {
    width:100%; height:100%; height:-webkit-fill-available; overflow:hidden;
    font-family:var(--font-body); color:var(--text);
    background: radial-gradient(circle at 50% 18%, rgba(255,255,255,.72), transparent 30%),
      radial-gradient(circle at 20% 100%, rgba(188,168,137,.18), transparent 38%),
      linear-gradient(135deg, var(--bg), var(--bg-deep));
    -webkit-font-smoothing:antialiased;
  }

  .auth-screen { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
  .auth-card { width:min(420px, calc(100% - 40px)); padding:40px 36px; border-radius:28px; background:rgba(255,250,242,.82); border:1px solid rgba(52,43,33,.12); box-shadow:var(--shadow); backdrop-filter:blur(22px) saturate(1.4); display:flex; flex-direction:column; align-items:center; }
  .auth-logo { width:72px; height:72px; border-radius:22px; display:grid; place-items:center; background:linear-gradient(145deg,#443f38 0%,#171513 58%,#0a0908 100%); border:1px solid rgba(245,226,191,.46); box-shadow:inset 0 3px 8px rgba(255,255,255,.16),inset 0 -18px 26px rgba(0,0,0,.34),0 16px 32px rgba(39,31,24,.15); margin-bottom:20px; }
  .auth-logo span { font-family:var(--font-display); font-size:28px; font-weight:700; letter-spacing:-2px; color:#fff8ec; text-shadow:0 2px 0 rgba(120,78,41,.85),0 6px 11px rgba(0,0,0,.42); }
  .auth-title { font-family:var(--font-display); font-size:24px; font-weight:700; letter-spacing:-.04em; margin-bottom:6px; }
  .auth-sub { font-size:13px; color:var(--t2); margin-bottom:28px; text-align:center; }
  .auth-tabs { display:flex; gap:4px; margin-bottom:24px; background:rgba(45,36,28,.06); border-radius:12px; padding:4px; width:100%; }
  .auth-tab { flex:1; height:36px; border-radius:9px; border:0; font-family:var(--font-body); font-weight:700; font-size:13px; cursor:pointer; transition:.16s ease; background:transparent; color:var(--t2); }
  .auth-tab.active { background:rgba(255,250,242,.9); color:var(--text); box-shadow:0 2px 8px rgba(45,36,28,.10); }
  .auth-form { width:100%; display:flex; flex-direction:column; gap:12px; }
  .auth-input { width:100%; height:48px; border-radius:14px; border:1px solid rgba(52,43,33,.14); background:rgba(255,250,242,.68); padding:0 16px; font-family:var(--font-body); font-size:14px; color:var(--text); outline:none; transition:.16s ease; }
  .auth-input:focus { border-color:rgba(94,74,51,.3); box-shadow:0 0 0 4px rgba(255,255,255,.4); background:rgba(255,252,248,.9); }
  .auth-input::placeholder { color:var(--t3); }
  .auth-btn { width:100%; height:48px; border-radius:14px; border:0; background:linear-gradient(145deg,#3a352f,#141312); color:#fffaf2; font-family:var(--font-body); font-weight:700; font-size:14px; cursor:pointer; margin-top:4px; box-shadow:inset 0 1px 4px rgba(255,255,255,.18),0 8px 16px rgba(45,36,28,.18); transition:.16s ease; }
  .auth-btn:hover { transform:translateY(-1px); }
  .auth-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
  .auth-error { width:100%; padding:10px 14px; border-radius:12px; background:rgba(220,50,50,.08); border:1px solid rgba(220,50,50,.18); color:#b83232; font-size:12px; font-weight:600; display:none; margin-bottom:8px; }
  .auth-error.show { display:block; }

  .app { width:100vw; height:100vh; display:none; }
  .app.visible { display:flex; }

  .sidebar { width:278px; min-width:278px; height:100%; padding:18px 14px; display:flex; flex-direction:column; gap:16px; background:rgba(255,250,242,.42); border-right:1px solid rgba(52,43,33,.10); backdrop-filter:blur(22px) saturate(1.5); }
  .brand-mini { display:flex; align-items:center; gap:10px; padding:4px 6px 12px; cursor:pointer; user-select:none; }
  .mini-mark { width:36px; height:36px; border-radius:13px; display:grid; place-items:center; color:var(--white); font-family:var(--font-display); font-weight:800; letter-spacing:-.8px; background:linear-gradient(145deg,#45413c,#11100f 70%); border:1px solid rgba(255,255,255,.28); box-shadow:inset 0 1px 5px rgba(255,255,255,.22),inset 0 -10px 18px rgba(0,0,0,.30),0 10px 20px rgba(0,0,0,.12); }
  .brand-text { font-family:var(--font-display); font-weight:800; font-size:18px; letter-spacing:-.5px; }
  .brand-sub { font-size:10px; color:var(--t3); margin-top:1px; font-weight:600; }
  .user-pill { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:13px; background:rgba(255,250,242,.6); border:1px solid var(--line); font-size:12px; cursor:pointer; transition:.15s ease; }
  .user-pill:hover { background:rgba(255,250,242,.9); }
  .user-avatar { width:26px; height:26px; border-radius:8px; background:linear-gradient(145deg,#45413c,#11100f); display:grid; place-items:center; color:#fffaf2; font-weight:800; font-size:11px; font-family:var(--font-display); }
  .user-name { flex:1; font-weight:700; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .logout-btn { font-size:11px; color:var(--t3); background:none; border:none; cursor:pointer; padding:2px 6px; border-radius:6px; font-family:var(--font-body); font-weight:600; transition:.15s ease; }
  .logout-btn:hover { color:#b83232; background:rgba(220,50,50,.08); }
  .new-chat { height:42px; border-radius:14px; border:1px solid var(--line-strong); background:rgba(255,250,242,.68); color:var(--text); font-weight:700; font-family:var(--font-body); cursor:pointer; box-shadow:var(--shadow-soft); transition:.18s ease; }
  .new-chat:hover { transform:translateY(-1px); background:rgba(255,252,247,.9); }
  .section-label { font-size:10px; font-weight:800; letter-spacing:1.25px; text-transform:uppercase; color:var(--t3); padding:0 4px; }
  .chat-history { display:flex; flex-direction:column; gap:7px; overflow:auto; padding-right:2px; }
  .chat-history::-webkit-scrollbar { width:4px; }
  .chat-history::-webkit-scrollbar-thumb { background:rgba(0,0,0,.12); border-radius:20px; }
  .history-item { border-radius:13px; padding:10px 11px; font-size:13px; color:var(--t2); background:transparent; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:.16s ease; }
  .history-item:hover, .history-item.active { background:rgba(255,250,242,.74); color:var(--text); box-shadow:0 5px 16px rgba(45,36,28,.06); }

  .main { flex:1; min-width:0; height:100%; position:relative; display:flex; flex-direction:column; }
  .topbar { height:66px; flex-shrink:0; display:flex; align-items:center; justify-content:space-between; padding:16px 28px; border-bottom:1px solid rgba(52,43,33,.08); background:rgba(255,250,242,.24); backdrop-filter:blur(14px); }
  .top-title { cursor:pointer; font-family:var(--font-display); font-weight:800; letter-spacing:-.4px; font-size:16px; }
  .top-actions { display:flex; align-items:center; gap:10px; }
  .imagine-btn { height:36px; padding:0 13px; border-radius:999px; border:1px solid var(--line); background:rgba(255,250,242,.62); color:var(--text); font-weight:700; font-size:13px; cursor:pointer; }
  .messages { flex:1; overflow:auto; padding:28px; display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth; }
  .messages::-webkit-scrollbar { width:5px; }
  .messages::-webkit-scrollbar-thumb { background:rgba(0,0,0,.12); border-radius:20px; }
  .main.chatting .messages { padding-bottom:160px; }

  .welcome { min-height:calc(100vh - 120px); display:flex; flex-direction:column; align-items:center; justify-content:center; padding-bottom:106px; text-align:center; }
  .hero-logo { cursor:pointer; width:86px; height:86px; border-radius:26px; position:relative; display:grid; place-items:center; margin-bottom:24px; background:radial-gradient(circle at 34% 18%,rgba(255,255,255,.38),transparent 28%),linear-gradient(145deg,#443f38 0%,#171513 58%,#0a0908 100%); border:1px solid rgba(245,226,191,.46); box-shadow:inset 0 3px 8px rgba(255,255,255,.16),inset 0 -18px 26px rgba(0,0,0,.34),0 16px 32px rgba(39,31,24,.15),0 1px 0 rgba(255,255,255,.65); transform:perspective(520px) rotateX(5deg); }
  .hero-logo::before { content:""; position:absolute; inset:-2px; border-radius:28px; z-index:-1; background:linear-gradient(145deg,#e2c99d,#9a7042 46%,#f2dfba 76%,#6f4b2f); }
  .hero-logo::after { content:""; position:absolute; top:10px; left:13px; right:13px; height:22px; border-radius:999px; background:linear-gradient(to bottom,rgba(255,255,255,.26),transparent); pointer-events:none; }
  .hero-letters { font-family:var(--font-display); font-size:34px; font-weight:700; letter-spacing:-2px; color:#fff8ec; text-shadow:0 2px 0 rgba(120,78,41,.85),0 6px 11px rgba(0,0,0,.42); }
  .welcome-title { font-family:var(--font-display); font-size:clamp(34px,4.2vw,48px); line-height:1.08; font-weight:650; letter-spacing:-0.055em; max-width:620px; color:#201c18; text-shadow:0 8px 20px rgba(43,35,28,.13); }
  .welcome-subtitle { margin-top:12px; font-size:15px; font-weight:500; color:var(--t2); max-width:520px; line-height:1.55; }

  .input-area { position:absolute; left:50%; bottom:calc(50% - 118px); transform:translateX(-50%); width:min(760px,calc(100% - 64px)); z-index:10; transition:.35s cubic-bezier(.2,.9,.2,1); }
  .main.chatting .input-area { bottom:20px; width:min(850px,calc(100% - 56px)); }

@supports (-webkit-touch-callout: none) {
  .main.chatting .input-area { bottom: env(safe-area-inset-bottom, 20px); }
}

  .input-wrapper { min-height:58px; display:flex; align-items:center; gap:6px; padding:9px 8px 9px 14px; border-radius:999px; background:rgba(255,250,242,.78); border:1px solid rgba(52,43,33,.14); box-shadow:var(--shadow); backdrop-filter:blur(22px) saturate(1.4); }
  .input-wrapper:focus-within { border-color:rgba(94,74,51,.26); box-shadow:0 20px 55px rgba(45,36,28,.16),0 0 0 4px rgba(255,255,255,.36); }
  .attach-btn { width:38px; height:38px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--t2); border-radius:50%; flex-shrink:0; transition:all .15s ease; }
  .attach-btn:hover { color:var(--text); background:rgba(0,0,0,.045); }
  #chat-input { flex:1; border:0; outline:0; resize:none; background:transparent; min-height:25px; max-height:130px; padding:4px 2px; font-family:var(--font-body); font-size:15px; color:var(--text); line-height:1.45; }
  #chat-input::placeholder { color:#8d8378; }
  .file-preview-wrap { position:absolute; left:18px; bottom:68px; }
  .file-chip { display:flex; align-items:center; gap:7px; background:rgba(255,250,242,.82); border:1px solid rgba(182,139,88,.25); border-radius:10px; padding:6px 11px; font-size:12px; color:#8a6339; box-shadow:0 8px 20px rgba(45,36,28,.08); }
  .file-chip-remove { cursor:pointer; color:var(--t3); margin-left:5px; font-size:15px; line-height:1; }

  .model-switch { position:relative; flex-shrink:0; }
  .model-pill { height:38px; display:flex; align-items:center; gap:7px; padding:0 12px; border-radius:999px; border:1px solid transparent; background:transparent; color:var(--text); font-weight:800; font-size:12px; cursor:pointer; }
  .model-pill:hover { background:rgba(0,0,0,.045); border-color:var(--line); }
  .model-dot { width:7px; height:7px; background:#7c5cff; border-radius:50%; box-shadow:0 0 0 3px rgba(124,92,255,.10); }
  .model-menu { display:none; position:absolute; right:0; bottom:48px; width:260px; padding:8px; border-radius:18px; background:rgba(255,250,242,.94); border:1px solid var(--line); box-shadow:var(--shadow); backdrop-filter:blur(18px); z-index:20; }
  .model-menu.open { display:block; }
  .model-card { display:flex; align-items:center; gap:10px; padding:10px; border-radius:13px; cursor:pointer; transition:.15s ease; }
  .model-card:hover, .model-card.active { background:rgba(45,36,28,.06); }
  .model-icon { width:24px; text-align:center; }
  .model-info { min-width:0; flex:1; }
  .model-name { font-size:13px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .model-desc { font-size:11px; color:var(--t3); margin-top:1px; }
  .model-active-dot { width:7px; height:7px; border-radius:50%; background:#36c26b; opacity:0; }
  .model-card.active .model-active-dot { opacity:1; }

  .send-btn { width:42px; height:42px; border-radius:50%; border:0; flex-shrink:0; display:grid; place-items:center; cursor:pointer; background:linear-gradient(145deg,#3a352f,#141312); color:#fffaf2; box-shadow:inset 0 1px 4px rgba(255,255,255,.18),0 8px 16px rgba(45,36,28,.18); transition:.16s ease; }
  .send-btn:hover { transform:scale(1.04); }
  .send-btn:active { transform:scale(.96); }
  .send-btn:disabled { opacity:.45; cursor:not-allowed; transform:none; }
  .send-btn svg { width:17px; height:17px; }

  /* Golden Lynthz Avatar */
  .lynthz-avatar { position:relative; width:42px; height:42px; display:grid; place-items:center; user-select:none; border-radius:16px 12px 16px 12px; background:linear-gradient(135deg,rgba(255,255,255,.72),rgba(255,255,255,.08)),linear-gradient(145deg,#e1c08a,#8f642f 70%); color:#21170d; font-weight:800; font-size:16px; letter-spacing:-1px; box-shadow:0 14px 28px rgba(145,94,37,.22),inset 0 1px 0 rgba(255,255,255,.70); flex-shrink:0; font-family:var(--font-display); }
  .lynthz-avatar::after { content:"✧"; position:absolute; right:7px; top:4px; font-size:10px; color:rgba(255,255,255,.86); }
  .lynthz-avatar.small { width:34px; height:34px; border-radius:13px 10px 13px 10px; font-size:13px; margin-top:2px; }
  .lynthz-avatar.small::after { right:5px; top:3px; font-size:8px; }

  /* Mic button */
  .mic-btn { width:38px; height:38px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--t2); border-radius:50%; flex-shrink:0; border:0; background:transparent; transition:all .15s ease; }
  .mic-btn:hover { color:var(--text); background:rgba(0,0,0,.045); }
  .mic-btn.listening { color:#e05555; background:rgba(224,85,85,.10); animation:micPulse 1s ease infinite; }
  @keyframes micPulse { 0%,100% { box-shadow:0 0 0 0 rgba(224,85,85,.3); } 50% { box-shadow:0 0 0 7px rgba(224,85,85,.0); } }

  .message { display:flex; gap:12px; animation:msgIn .28s ease both; }
  @keyframes msgIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  .message.user { flex-direction:row-reverse; }
  .msg-avatar { width:34px; height:34px; border-radius:12px; flex-shrink:0; margin-top:2px; display:grid; place-items:center; font-weight:800; font-family:var(--font-display); }
  .message.user .msg-avatar { background:var(--dark); color:white; }
  .msg-body { max-width:min(800px,82%); display:flex; flex-direction:column; gap:5px; }
  .message.user .msg-body { align-items:flex-end; }
  .msg-bubble { padding:13px 16px; border-radius:20px; font-size:14px; line-height:1.65; min-height:52px; }
  .message.user .msg-bubble { background:linear-gradient(145deg,#302c28,#151413); color:#fffaf2; border-bottom-right-radius:5px; }
  .message.assistant .msg-bubble { background:rgba(255,250,242,.66); border:1px solid rgba(52,43,33,.10); box-shadow:var(--shadow-soft); border-bottom-left-radius:5px; }
  .msg-bubble h1,.msg-bubble h2,.msg-bubble h3,.msg-bubble h4 { font-family:var(--font-display); margin:10px 0 6px; }
  .msg-bubble h1 { font-size:20px; } .msg-bubble h2 { font-size:17px; } .msg-bubble h3 { font-size:15px; } .msg-bubble h4 { font-size:13px; font-weight:700; }
  .msg-bubble p { margin-bottom:8px; } .msg-bubble p:last-child { margin-bottom:0; }
  .msg-bubble ul { padding-left:18px; margin:6px 0; } .msg-bubble li { margin-bottom:3px; }
  .msg-bubble code { background:rgba(0,0,0,.06); border-radius:6px; padding:2px 5px; font-size:12px; }
  .msg-bubble pre { background:rgba(0,0,0,.055); padding:12px; border-radius:12px; overflow:auto; margin:8px 0; }
  .msg-bubble a { color:var(--gold); text-decoration:underline; }
  .msg-meta { display:flex; align-items:center; gap:7px; padding:0 5px; color:var(--t3); font-size:10px; }
  .message.user .msg-meta { justify-content:flex-end; }
  .msg-model-tag { background:rgba(0,0,0,.045); border-radius:999px; padding:1px 7px; }

  .searching-pill { display:inline-flex; align-items:center; gap:6px; padding:5px 10px; border-radius:999px; background:rgba(182,139,88,.10); color:#8a6339; font-size:11px; font-weight:700; margin-bottom:6px; }
  .search-cards { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
  .search-card { background:rgba(255,255,255,.46); border:1px solid rgba(52,43,33,.08); border-radius:13px; padding:10px; }
  .search-card-title { font-size:12px; font-weight:800; }
  .search-card-snippet { font-size:11px; color:var(--t2); margin-top:3px; }
  .search-card-url { font-size:10px; color:var(--t3); margin-top:4px; }
  .weather-card { display:flex; align-items:center; gap:13px; background:rgba(255,255,255,.46); border:1px solid rgba(52,43,33,.08); border-radius:15px; padding:12px; margin-top:8px; }
  .weather-temp { font-family:var(--font-display); font-size:26px; font-weight:800; }
  .gen-image { max-width:100%; border-radius:14px; margin-top:10px; border:1px solid var(--line); box-shadow:var(--shadow-soft); display:block; }

  .table-wrap { overflow-x:auto; margin:10px 0; border-radius:12px; border:1px solid var(--line); }
  .md-table { width:100%; border-collapse:collapse; font-size:13px; }
  .md-table th { background:rgba(45,36,28,.07); font-weight:800; font-family:var(--font-display); padding:9px 13px; text-align:left; border-bottom:1px solid var(--line-strong); white-space:nowrap; }
  .md-table td { padding:8px 13px; border-bottom:1px solid var(--line); color:var(--t2); }
  .md-table tr:last-child td { border-bottom:none; }
  .md-table tr:hover td { background:rgba(255,250,242,.6); }
  .thinking-loader {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--t2);
  font-size: 13px;
  font-weight: 600;
}

.thinking-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--t2);
  opacity: .35;
  animation: thinkingPulse 1.2s infinite ease-in-out;
}

.thinking-dot:nth-child(3) { animation-delay: .15s; }
.thinking-dot:nth-child(4) { animation-delay: .3s; }

@keyframes thinkingPulse {
  0%, 80%, 100% { transform: scale(.7); opacity: .25; }
  40% { transform: scale(1); opacity: .85; }
}

  @media (max-width:820px) {
  html, body { height: 100dvh; overflow: hidden; }
  .app { height: 100dvh; }
  .sidebar { display:none; }
  .topbar { height:64px; padding:14px 18px; }
  .messages { padding:18px; padding-bottom:150px !important; }
  .main.chatting .messages { padding-bottom:150px !important; }

  .input-area,
  .main.chatting .input-area {
    position: fixed !important;
    left: 12px !important;
    right: 12px !important;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 24px) !important;
    width: auto !important;
    transform: none !important;
    padding: 0 !important;
    z-index: 9999 !important;
  }

  .input-wrapper { min-height:58px; border-radius:28px; }
  .hero-logo { width:76px; height:76px; border-radius:23px; }
  .hero-letters { font-size:30px; }
  .welcome-title { font-size:34px; }
  .model-pill span.label { display:none; }
}
</style>
</head>
<body>

<div class="auth-screen" id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo"><span>Ly</span></div>
    <div class="auth-title">Welcome to Lynthz</div>
    <div class="auth-sub">Your intelligent AI workspace</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div class="auth-error" id="auth-error"></div>
    <div class="auth-form" id="auth-form-login">
      <input class="auth-input" type="email" id="login-email" placeholder="Email address" onkeydown="if(event.key==='Enter')handleLogin()" />
      <input class="auth-input" type="password" id="login-password" placeholder="Password" onkeydown="if(event.key==='Enter')handleLogin()" />
      <button class="auth-btn" id="login-btn" onclick="handleLogin()">Sign In →</button>
    </div>
    <div class="auth-form" id="auth-form-signup" style="display:none">
      <input class="auth-input" type="text" id="signup-name" placeholder="Your name" />
      <input class="auth-input" type="email" id="signup-email" placeholder="Email address" />

  </div>
</div>

<div class="app" id="app">
  <aside class="sidebar">

        <div class="hero-logo" onclick="goHome()"><span class="hero-letters">Ly</span></div>
        <div class="welcome-title" id="welcome-title">Hello, I'm Lynthz</div>
        <div class="welcome-subtitle">Ask anything, switch models, attach files, or create visuals.</div>
      </div>
    </div>
    <div class="input-area">
      <div class="file-preview-wrap" id="file-preview" style="display:none"></div>
      <div class="input-wrapper">
        <label for="file-input" class="attach-btn" title="Attach file">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </label>
        <input type="file" id="file-input" accept="image/*,.pdf,.txt" style="display:none" onchange="onFileSelect(event)" />
        <textarea id="chat-input" placeholder="What do you want to know?" rows="1" onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
        <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Click to speak">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
          </svg>

<script>
let currentUser = null;
let currentUserId = null;

function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-signup').classList.toggle('active', tab==='signup');
  document.getElementById('auth-form-login').style.display = tab==='login' ? 'flex' : 'none';
  document.getElementById('auth-form-signup').style.display = tab==='signup' ? 'flex' : 'none';
  hideAuthError();
}
function showAuthError(msg) { const el=document.getElementById('auth-error'); el.textContent=msg; el.classList.add('show'); }
function hideAuthError() { document.getElementById('auth-error').classList.remove('show'); }

async function handleLogin() {
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  if (!email||!password) return showAuthError('Please fill in all fields');
  const btn=document.getElementById('login-btn');
  btn.disabled=true; btn.textContent='Signing in…'; hideAuthError();
  try {
    const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await res.json();
    if (!res.ok) throw new Error(data.detail||'Login failed');
    onAuthSuccess(data);
  } catch(e) { showAuthError(e.message); }
  finally { btn.disabled=false; btn.textContent='Sign In →'; }
}

async function handleSignup() {
  const name=document.getElementById('signup-name').value.trim();
  const email=document.getElementById('signup-email').value.trim();
  const password=document.getElementById('signup-password').value;
  if (!name||!email||!password) return showAuthError('Please fill in all fields');
  if (password.length<6) return showAuthError('Password must be at least 6 characters');
  const btn=document.getElementById('signup-btn');
  btn.disabled=true; btn.textContent='Creating account…'; hideAuthError();
  try {
    const res=await fetch('/api/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password,name})});
    const data=await res.json();
    if (!res.ok) throw new Error(data.detail||'Signup failed');
    onAuthSuccess(data);
  } catch(e) { showAuthError(e.message); }
  finally { btn.disabled=false; btn.textContent='Create Account →'; }
}

function onAuthSuccess(data) {
  currentUser=data.user; currentUserId=data.user?.id||data.user_id;
  localStorage.setItem('lynthz_user',JSON.stringify(data));
  const name=data.name||data.user?.email?.split('@')[0]||'User';
  document.getElementById('user-name-display').textContent=name;
  document.getElementById('user-avatar').textContent=name[0].toUpperCase();
  document.getElementById('welcome-title').textContent=`Hello, ${name.split(' ')[0]}!`;
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').classList.add('visible');
  connectWS(); loadModels(); renderHistory(); loadChatHistory(currentUserId);
}

async function handleLogout() {
  try { await fetch('/api/auth/logout',{method:'POST'}); } catch(e) {}
  localStorage.removeItem('lynthz_user');
  currentUser=null; currentUserId=null;
  if (ws) { ws.close(); ws=null; }
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app').classList.remove('visible');
}

function checkStoredAuth() {
  const stored=localStorage.getItem('lynthz_user');
  if (stored) { try { const data=JSON.parse(stored); if (data.user_id||data.user?.id) { onAuthSuccess(data); return true; } } catch(e) {} }
  return false;
}

let ws=null, selectedModel=null, currentAssistantMsg=null, isStreaming=false, currentModelTag='', models=[], attachedFile=null, pendingPayload=null;
let historyTitles=JSON.parse(localStorage.getItem('lynthz_history_titles')||'[]');

function connectWS() {
  if (ws&&ws.readyState===WebSocket.OPEN) return;
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}/ws/chat`);
  ws.onopen=()=>{ if(pendingPayload){ws.send(pendingPayload);pendingPayload=null;} };
  ws.onmessage=(e)=>handleChunk(JSON.parse(e.data));
  ws.onclose=()=>{ setTimeout(connectWS,2000); };
  ws.onerror=(err)=>console.error('[Lynthz] WS error',err);
  function removeThinkingLoader() {
  if (currentAssistantMsg) {
    const loader = currentAssistantMsg.querySelector('.thinking-loader');
    if (loader) loader.remove();
  }
}
}

function handleChunk(chunk) {
  switch(chunk.type) {
    case 'model_info': currentModelTag=chunk.label||getActiveModelLabel(); break;
    case 'searching':
      if (!currentAssistantMsg) currentAssistantMsg=createAssistantMessage();
      removeThinkingLoader();
      const pill=document.createElement('div'); pill.className='searching-pill';
      pill.innerHTML='<span>🔍</span> Searching the web…';
      currentAssistantMsg.querySelector('.msg-bubble').appendChild(pill); break;
    case 'search_results':
      if (currentAssistantMsg&&chunk.data?.cards) {
        const bub=currentAssistantMsg.querySelector('.msg-bubble');
        const sp=bub.querySelector('.searching-pill'); if(sp) sp.remove();
        if (chunk.data.cards.length>0) {
          const cardsEl=document.createElement('div'); cardsEl.className='search-cards';
          chunk.data.cards.slice(0,4).forEach(card=>{ cardsEl.innerHTML+=`<div class="search-card"><div class="search-card-title">${escHtml(card.title)}</div><div class="search-card-snippet">${escHtml(card.snippet)}</div><div class="search-card-url">${escHtml(card.url)}</div></div>`; });
          bub.appendChild(cardsEl);
        }
      } break;
    case 'weather_data':
      if (currentAssistantMsg&&chunk.data&&!chunk.data.error) {
        const d=chunk.data; const wCard=document.createElement('div'); wCard.className='weather-card';
        wCard.innerHTML=`<img src="https://openweathermap.org/img/wn/${d.icon}@2x.png" style="width:52px;height:52px" onerror="this.outerHTML='🌤️'"/><div><div class="weather-temp">${d.temp}°C</div><div style="font-weight:800;font-size:13px">${escHtml(d.location)}, ${escHtml(d.country)}</div><div style="font-size:12px;color:var(--t2)">${escHtml(d.description)}</div><div style="font-size:11px;color:var(--t3);margin-top:4px">Humidity: ${d.humidity}% · Wind: ${d.wind_speed} m/s · Feels like ${d.feels_like}°C</div></div>`;
        currentAssistantMsg.querySelector('.msg-bubble').appendChild(wCard);
      } break;
    case 'image_data':
      if (!currentAssistantMsg) currentAssistantMsg=createAssistantMessage();
      if (chunk.data&&!chunk.data.error) {
        const wrap=document.createElement('div'); wrap.style.cssText='margin-top:10px';
        const img=document.createElement('img'); img.className='gen-image'; img.src=chunk.data.image_url; img.alt=chunk.data.prompt||'Generated image';
        img.onerror=()=>{ wrap.innerHTML='<div style="color:var(--t3);font-size:12px;padding:8px">⚠️ Image failed to load.</div>'; };
        wrap.appendChild(img);
        const cap=document.createElement('div'); cap.style.cssText='font-size:11px;color:var(--t3);margin-top:6px;padding:0 2px';
        cap.textContent=`🎨 "${chunk.data.prompt}"`; wrap.appendChild(cap);
        currentAssistantMsg.querySelector('.msg-bubble').appendChild(wrap);
      } break;
 case 'token':
  if (!currentAssistantMsg) currentAssistantMsg=createAssistantMessage();

  removeThinkingLoader();

  const tc=currentAssistantMsg.querySelector('.text-content');
  if (tc) {
    tc.style.display='inline';
    tc.textContent += chunk.content.replace(/^Thinking\s*/i, '');
  }

  scrollToBottom();
  break;
    case 'done':
      if (currentAssistantMsg) {
        const t=currentAssistantMsg.querySelector('.text-content');
        if (t&&t.textContent) t.innerHTML=parseMarkdown(t.textContent);
        const meta=currentAssistantMsg.querySelector('.msg-model-tag');
        if (meta) meta.textContent=currentModelTag||getActiveModelLabel();
        currentAssistantMsg=null;
      }
      isStreaming=false; setSendEnabled(true); scrollToBottom(); break;
    case 'error':
      addSystemMessage(`Error: ${chunk.message}`); isStreaming=false; setSendEnabled(true); break;
  }
}

function createAssistantMessage() {
  hideWelcome();
  const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const el=document.createElement('div');
  el.className='message assistant';

  el.innerHTML=`<div class="lynthz-avatar small">Ly</div>
  <div class="msg-body">
    <div class="msg-bubble">

      <span class="thinking-loader" style="display:flex">
        <span class="thinking-dot"></span>
        <span class="thinking-dot"></span>
        <span class="thinking-dot"></span>
      </span>

      <span class="text-content" style="display:none"></span>

    </div>

    <div class="msg-meta">
      <span>${time}</span>
      <span class="msg-model-tag"></span>
    </div>
  </div>`;

  document.getElementById('messages').appendChild(el);
  scrollToBottom();
  return el;
}

function addUserMessage(text) {
  hideWelcome(); saveHistoryTitle(text);
  const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const initial=(currentUser?.email||'U')[0].toUpperCase();
  const el=document.createElement('div'); el.className='message user';
  el.innerHTML=`<div class="msg-avatar">${initial}</div><div class="msg-body"><div class="msg-bubble">${escHtml(text)}</div><div class="msg-meta"><span>${time}</span></div></div>`;
  document.getElementById('messages').appendChild(el); scrollToBottom();
}

function addSystemMessage(text) {
  hideWelcome();
  const el=document.createElement('div'); el.style.cssText='text-align:center;font-size:12px;color:var(--t3);padding:4px';
  el.textContent=text; document.getElementById('messages').appendChild(el); scrollToBottom();
}

function sendMessage() {
  const input=document.getElementById('chat-input'); const text=input.value.trim();
  if ((!text&&!attachedFile)||isStreaming) return;
  if (attachedFile) { sendWithFile(text||'Analyze this file'); return; }
  if (!ws||ws.readyState!==WebSocket.OPEN) { addSystemMessage('Reconnecting…'); connectWS(); return; }
  addUserMessage(text); input.value=''; autoResize(input);
 isStreaming=true; 
setSendEnabled(false);
currentAssistantMsg = createAssistantMessage();
ws.send(JSON.stringify({message:text,model:selectedModel,user_id:currentUserId}));
}

function sendWithFile(text) {
  if (isStreaming||!attachedFile) return;
  const file=attachedFile; const isImage=file.type?.startsWith('image/');
  const cleanText=text||(isImage?'Analyze this image':'Analyze this file');
  addUserMessage(cleanText); document.getElementById('chat-input').value='';
  autoResize(document.getElementById('chat-input')); 
isStreaming=true; 
setSendEnabled(false);
currentAssistantMsg = createAssistantMessage();
  const reader=new FileReader();
  reader.onload=()=>{
    const b64=String(reader.result||'').split(',')[1]||''; const mime=file.type||'application/octet-stream';
    const payload={message:cleanText,model:selectedModel,user_id:currentUserId,file_b64:b64,file_mime:mime,file_name:file.name};
    if (isImage) { payload.image_b64=b64; payload.image_mime=mime; }
    removeFile();
    if (ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify(payload));
    else { pendingPayload=JSON.stringify(payload); connectWS(); }
  };
  reader.onerror=()=>{ addSystemMessage('File read failed.'); isStreaming=false; setSendEnabled(true); };
  reader.readAsDataURL(file);
}

function sendImaginePrompt() { const input=document.getElementById('chat-input'); input.value='Generate an image of '; input.focus(); autoResize(input); }
function handleKeydown(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,130)+'px'; }

function onFileSelect(e) {
  const file=e.target.files[0]; if (!file) return;
  attachedFile=file; const preview=document.getElementById('file-preview'); preview.style.display='block';
  const isImage=file.type?.startsWith('image/');
  if (isImage) { const url=URL.createObjectURL(file); preview.innerHTML=`<div class="file-chip"><img src="${url}" style="width:22px;height:22px;object-fit:cover;border-radius:6px"> ${escHtml(file.name)}<span class="file-chip-remove" onclick="removeFile()">×</span></div>`; }
  else { preview.innerHTML=`<div class="file-chip">📎 ${escHtml(file.name)}<span class="file-chip-remove" onclick="removeFile()">×</span></div>`; }
}

function removeFile() { attachedFile=null; document.getElementById('file-preview').style.display='none'; document.getElementById('file-preview').innerHTML=''; document.getElementById('file-input').value=''; }
function hideWelcome() { const w=document.getElementById('welcome'); if(w) w.style.display='none'; document.getElementById('main').classList.remove('home'); document.getElementById('main').classList.add('chatting'); }
function scrollToBottom() { const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }
function setSendEnabled(e) { document.getElementById('send-btn').disabled=!e; }
function escHtml(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function parseMarkdown(text) {
  const codeBlocks=[];
  let result=text.replace(/```([\w]*)\n?([\s\S]*?)```/g,(_,lang,code)=>{ const idx=codeBlocks.length; codeBlocks.push(`<pre><code class="lang-${lang}">${escHtml(code.trim())}</code></pre>`); return `%%CODE_${idx}%%`; });
  result=result.replace(/((?:\|.+\|\n?){2,})/g,(match)=>{
    const rows=match.trim().split('\n').filter(r=>r.trim()); if(rows.length<2) return match;
    let html='<div class="table-wrap"><table class="md-table">'; let headerDone=false;
    rows.forEach((row)=>{ if(/^\|[\s\-:|]+\|$/.test(row.trim())) { if(!headerDone){html+='</tr></thead><tbody>';headerDone=true;} return; }
      const cells=row.trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      if(!headerDone){html+='<thead><tr>';cells.forEach(c=>{html+=`<th>${c}</th>`;});}
      else{html+='<tr>';cells.forEach(c=>{html+=`<td>${c}</td>`;});html+='</tr>';}
    });
    html+=headerDone?'</tbody>':'</tr></thead>'; html+='</table></div>'; return html;
  });
  result=result.split(/(%%CODE_\d+%%|<div class="table-wrap">[\s\S]*?<\/div>)/g).map((part,i)=>{ if(i%2===1) return part; return escHtml(part); }).join('');
  result=result.replace(/^#### (.+)$/gm,'<h4>$1</h4>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/^\s*[-*] (.+)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>\n?)+/g,m=>`<ul>${m}</ul>`).replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
  codeBlocks.forEach((block,idx)=>{ result=result.replace(`%%CODE_${idx}%%`,block); });
  return result;
}

async function loadModels() {
  try { const res=await fetch('/api/models'); const data=await res.json(); models=data.models||[]; }
  catch(e) { models=[{key:'llama',label:'Llama',description:'Fast general model',icon:'⚡'}]; }
  renderModelMenu(); updateModelPill();
}

function renderModelMenu() {
  const menu=document.getElementById('model-menu'); menu.innerHTML='';
  const ac=document.createElement('div'); ac.className='model-card'+((!selectedModel)?' active':'');
  ac.innerHTML=`<div class="model-icon">🎯</div><div class="model-info"><div class="model-name">Auto-route</div><div class="model-desc">Smart model selection</div></div><div class="model-active-dot"></div>`;
  ac.onclick=()=>selectModel(null); menu.appendChild(ac);
  models.forEach(m=>{ const card=document.createElement('div'); card.className='model-card'+(selectedModel===m.key?' active':'');
    card.innerHTML=`<div class="model-icon">${m.icon||'⚡'}</div><div class="model-info"><div class="model-name">${escHtml(m.label)}</div><div class="model-desc">${escHtml(m.description||'')}</div></div><div class="model-active-dot"></div>`;
    card.onclick=()=>selectModel(m.key); menu.appendChild(card); });
}

function toggleModelMenu() { document.getElementById('model-menu').classList.toggle('open'); }
function selectModel(key) { selectedModel=key||null; renderModelMenu(); updateModelPill(); document.getElementById('model-menu').classList.remove('open'); }
function updateModelPill() { document.getElementById('model-pill-text').textContent=getActiveModelLabel(); }
function getActiveModelLabel() { if(!selectedModel)return'Auto'; const m=models.find(x=>x.key===selectedModel); return m?m.label:'Auto'; }
document.addEventListener('click',e=>{ const s=document.querySelector('.model-switch'); if(s&&!s.contains(e.target)) document.getElementById('model-menu').classList.remove('open'); });

function saveHistoryTitle(text) {
  const title=text.length>42?text.slice(0,42)+'…':text;
  if (!historyTitles.includes(title)) { historyTitles.unshift(title); historyTitles=historyTitles.slice(0,18); localStorage.setItem('lynthz_history_titles',JSON.stringify(historyTitles)); renderHistory(); }
}

function renderHistory() {
  const list=document.getElementById('chat-history');
  list.innerHTML='<div class="history-item active">New conversation</div>';
  historyTitles.forEach(t=>{ const item=document.createElement('div'); item.className='history-item'; item.textContent=t; item.onclick=()=>{ document.getElementById('chat-input').value=t; document.getElementById('chat-input').focus(); }; list.appendChild(item); });
}

async function loadChatHistory(userId) {
  if (!userId) return;
  try {
    const res=await fetch(`/api/history/${userId}`); const data=await res.json();
    if (!data.messages||data.messages.length===0) return;
    const recent=data.messages.slice(-20);
    recent.forEach(msg=>{
      if (msg.role==='user') addUserMessage(msg.content);
      else if (msg.role==='assistant') {
        hideWelcome();
        const time=new Date(msg.created_at||Date.now()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        const el=document.createElement('div'); el.className='message assistant';
        el.innerHTML=`<div class="lynthz-avatar small">Ly</div><div class="msg-body"><div class="msg-bubble"><span class="text-content"></span></div><div class="msg-meta"><span>${time}</span><span class="msg-model-tag">${escHtml(msg.model||'')}</span></div></div>`;
        document.getElementById('messages').appendChild(el);
        const tc=el.querySelector('.text-content'); if(tc) tc.innerHTML=parseMarkdown(msg.content||'');
        scrollToBottom();
      }
    });
  } catch(e) { console.error('History load failed:',e); }
}

function goHome() { location.reload(); }

async function clearConversation() {
  try { await fetch(`/api/clear?user_id=${currentUserId||''}`,{method:'POST'}); } catch(e) {}
  document.getElementById('messages').innerHTML=`<div class="welcome" id="welcome"><div class="hero-logo" onclick="goHome()"><span class="hero-letters">Ly</span></div><div class="welcome-title" id="welcome-title">Hello, I'm Lynthz</div><div class="welcome-subtitle">Ask anything, switch models, attach files, or create visuals.</div></div>`;
  document.getElementById('main').classList.add('home'); document.getElementById('main').classList.remove('chatting');
  currentAssistantMsg=null; isStreaming=false; setSendEnabled(true);
}

let recognition=null, isListening=false;

function initSpeech() {
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if (!SR) { document.getElementById('mic-btn').style.display='none'; return; }
  recognition=new SR(); recognition.continuous=false; recognition.interimResults=true; recognition.lang='en-US';
  recognition.onstart=()=>{ isListening=true; document.getElementById('mic-btn').classList.add('listening'); document.getElementById('chat-input').placeholder='🎤 Listening... speak now'; };
  recognition.onresult=(e)=>{ const transcript=Array.from(e.results).map(r=>r[0].transcript).join(''); document.getElementById('chat-input').value=transcript; autoResize(document.getElementById('chat-input')); };
  recognition.onend=()=>{ isListening=false; document.getElementById('mic-btn').classList.remove('listening'); document.getElementById('chat-input').placeholder='What do you want to know?'; const text=document.getElementById('chat-input').value.trim(); if(text) sendMessage(); };
  recognition.onerror=(e)=>{ isListening=false; document.getElementById('mic-btn').classList.remove('listening'); document.getElementById('chat-input').placeholder='What do you want to know?'; if(e.error==='not-allowed') addSystemMessage('Mic blocked. Allow microphone access in browser settings.'); else if(e.error!=='no-speech') addSystemMessage('Mic error: '+e.error); };
}

function toggleMic() {
  if (!recognition) { addSystemMessage('Voice not supported. Please use Chrome or Edge.'); return; }
  if (isListening) { recognition.stop(); } else { try { recognition.start(); } catch(e) { addSystemMessage('Could not start mic. Try again.'); } }
}

document.addEventListener('DOMContentLoaded',()=>{ initSpeech(); renderHistory(); if(!checkStoredAuth()){document.getElementById('auth-screen').style.display='flex';document.getElementById('app').classList.remove('visible');} });
</script>
</body>
</html>
